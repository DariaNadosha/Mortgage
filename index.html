<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <meta
            name="author"
            content="Daria Nadosha"
        />
        <meta
            name="description"
            content="Mortgage search website"
        />
        <title>Mortgage - practice</title>
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="/src/sass/style.scss"
        />
    </head>
    <body>
        <section class="promo">
            <div class="promo__wrapper">
                <div class="promo__media">
                    <div class="menu promo__menu">
                        <div class="hamburger promo__hamburger">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                    <img
                        src="/src/img/bg-promo.jpg"
                        alt="cat"
                        class="promo__cat"
                    />
                    <div class="promo__video">
                        <div class="promo__video-title">
                            Why a mortgage is so much more than just a rate?
                        </div>
                        <div class="promo__video-wrapper">
                            <a class="btn-play">
                                <svg
                                    width="11"
                                    height="16"
                                    viewBox="0 0 11 16"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        d="M11 8L0 16V0L11 8Z"
                                        fill="white"
                                    />
                                </svg>
                            </a>
                            <span class="promo__video-timing">0:34</span>
                        </div>
                    </div>
                </div>
                <div class="promo__content">
                    <a
                        href="#"
                        class="promo__logo"
                    >
                        <img
                            src="/src/img/logo/logo-promo.svg"
                            alt="logo"
                        />
                    </a>
                    <h1 class="promo__title">
                        Finding a mortgage is so
                        <span>much more</span>
                        than
                        <span>just a rate</span>
                    </h1>
                    <p class="promo__text">
                        Rates change, but every mortgage journey starts with a
                        relationship. (Pssst...it’s not just about clicking a
                        button)
                    </p>
                    <div class="promo__divider"></div>
                    <div class="promo__cta">
                        <div class="promo__cta-text">
                            Let us help you create your mortgage journey
                        </div>
                        <a
                            href="#"
                            class="btn-blue promo__btn"
                        >
                            <svg
                                width="20"
                                height="12"
                                viewBox="0 0 20 12"
                                fill="none"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                    d="M1.00001 6.83332C0.539768 6.83332 0.166672 6.46023 0.166672 5.99999C0.166672 5.53975 0.539768 5.16666 1.00001 5.16666H19C19.4602 5.16666 19.8333 5.53975 19.8333 5.99999C19.8333 6.46023 19.4602 6.83332 19 6.83332H1.00001Z"
                                    fill="white"
                                />
                                <path
                                    d="M17.8215 5.99999L13.4107 1.58925C13.0853 1.26381 13.0853 0.736171 13.4107 0.410734C13.7362 0.0852973 14.2638 0.0852973 14.5893 0.410734L19.5893 5.41073C19.9147 5.73617 19.9147 6.26381 19.5893 6.58925L14.5893 11.5892C14.2638 11.9147 13.7362 11.9147 13.4107 11.5892C13.0853 11.2638 13.0853 10.7362 13.4107 10.4107L17.8215 5.99999Z"
                                    fill="white"
                                />
                            </svg>
                            Get started
                        </a>
                        <a
                            href="#"
                            class="btn"
                        >
                            Schedule a time
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
